name: Tests

on:
  schedule:
    - cron: '0 0 * * SUN'
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
            fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '*'
          check-latest: true
          cache: pnpm
      - uses: docker/setup-compose-action@v1
        with:
          version: latest
      - uses: actions/cache@v4
        with:
          path: |
            .venv
            .cache
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/Cargo.lock') }}
      - run: pnpm install --frozen-lockfile
      - name: Linters
        run: pnpm run lint
      - name: Cargo Tests
        run: cargo test
      - name: Build Image
        run: docker compose build

{% extends "minimal_layout.html" %}
{% block title %}{{ error }}{% endblock %}
{% block content %}
{{ super() }}

<div class="text-center mx-auto my-5" style="max-width: 32rem;">
    <div class="display-1 fw-bold text-body-secondary">{{ status_code }}</div>
    <h1 class="fs-3 fw-semibold mb-3">Something went wrong</h1>
    <p class="text-body-secondary">{{ error }}</p>
    <a class="btn btn-primary mt-3" href="/">Back to home</a>
</div>
{% endblock %}

{% extends "minimal_layout.html" %}
{% block title %}Logs{% endblock %}
{% block base_head_content %}
{{ super() }}

    <link type="text/css" rel="stylesheet" href="/static/auto/web/scss/pages/logs.css" as="style">
    <script type="module" src="/static/auto/logs.mjs" async></script>
{% endblock %}
{% block content %}
{{ super() }}

<h2>🗓️ System Logs</h2>

<template id="template-mirlo-logs-viewer">
    <link type="text/css" rel="stylesheet" href="/static/auto/web/scss/components/logs-viewer.css" as="style" />
    <div id="toolbar">
        <div class="toolbar-range">
            <label>From <input type="date" id="date_from" /></label>
            <label>To <input type="date" id="date_to" /></label>
            <button type="button" id="clear_filter">Clear</button>
        </div>
        <div class="toolbar-actions">
            <button type="button" id="quick_today">Today</button>
            <button type="button" id="quick_month">This Month</button>
            <button type="button" id="quick_year">This Year</button>
        </div>
    </div>
    <div id="rows"></div>
    <div id="sentinel"></div>
    <div id="status"></div>
</template>

<mirlo-logs-viewer></mirlo-logs-viewer>
{% endblock %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" class="vh-100">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Odoo module metadata.">
        <meta name="keywords" content="Odoo, module, addon, metadata, information, restapi">
        <meta name="author" content="Alexandre D. Díaz">
        <link rel="icon" type="image/png" href="/static/favicon.png"/>
        {# Applied before first paint so dev-only UI / theme never flash wrong #}
        <script>
            document.documentElement.dataset.mode = localStorage.getItem('ommd_mode') || 'user';
            const ommd_theme = localStorage.getItem('ommd_theme');
            if (ommd_theme) {
                document.documentElement.dataset.bsTheme = ommd_theme;
            }
        </script>
        {% block base_head_content %}{% endblock %}
        <link type="text/css" rel="stylesheet" href="/static/auto/web/scss/main.css" as="style">
        <title>{% block title %}{% endblock %} - Odoo Module Metadata</title>
    </head>
    <body class="vh-100">
        {% block base_body_content %}{% endblock %}
        <script type="module" src="/static/auto/main.mjs" async></script>
    </body>
</html>
